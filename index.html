<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ezcut Gallery</title>
  <style>
    :root {
      --accent: #00bcd4;
      --bg: #1a1a2e;
      --card-bg: #16213e;
      --text: #e0e0e0;
      --text-dim: #8a8a9a;
      --success: #4caf50;
      --border: #2a2a4a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 2.5rem 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      color: var(--accent);
      font-size: 1.8rem;
      font-weight: 700;
    }

    header p {
      color: var(--text-dim);
      margin-top: 0.4rem;
      font-size: 0.95rem;
    }

    .toolbar {
      max-width: 1200px;
      margin: 1.5rem auto 0;
      padding: 0 1rem;
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .search-box {
      flex: 1;
      padding: 0.6rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card-bg);
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box:focus { border-color: var(--accent); }
    .search-box::placeholder { color: var(--text-dim); }

    .count {
      color: var(--text-dim);
      font-size: 0.85rem;
      white-space: nowrap;
    }

    .grid {
      max-width: 1200px;
      margin: 1.5rem auto;
      padding: 0 1rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.2rem;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.15s;
      cursor: pointer;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .card-img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: contain;
      background: #0f0f23;
      display: block;
    }

    .card-body { padding: 0.8rem 1rem; }

    .card-name {
      font-weight: 600;
      color: var(--accent);
      font-size: 1rem;
    }

    .card-meta {
      color: var(--text-dim);
      font-size: 0.8rem;
      margin-top: 0.3rem;
    }

    .empty {
      text-align: center;
      color: var(--text-dim);
      padding: 4rem 1rem;
      font-size: 1.1rem;
    }

    /* Modal */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .overlay.active { display: flex; }

    .modal {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      max-width: 600px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 1.5rem;
    }

    .modal h2 {
      color: var(--accent);
      font-size: 1.2rem;
      margin-bottom: 1rem;
    }

    .modal-img {
      width: 100%;
      max-height: 300px;
      object-fit: contain;
      background: #0f0f23;
      border-radius: 8px;
      margin-bottom: 1rem;
    }

    .modal-info {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.3rem 1rem;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    .modal-info dt { color: var(--accent); font-weight: 600; }
    .modal-info dd { color: var(--text); }

    .emoji-txt-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.8rem;
      font-family: monospace;
      font-size: 0.85rem;
      white-space: pre;
      overflow-x: auto;
      margin-bottom: 0.8rem;
      color: var(--text);
    }

    .btn {
      padding: 0.5rem 1rem;
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: transparent;
      color: var(--accent);
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover { background: rgba(0, 188, 212, 0.15); }

    .btn-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .btn.copied {
      border-color: var(--success);
      color: var(--success);
    }

    footer {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-dim);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1>ezcut Gallery</h1>
    <p>Mattermost 대형 이모지 공유 갤러리</p>
  </header>

  <div class="toolbar">
    <input class="search-box" type="text" id="search" placeholder="이모지 이름으로 검색...">
    <span class="count" id="count"></span>
  </div>

  <div class="grid" id="gallery"></div>
  <div class="empty" id="empty" style="display:none">
    아직 공유된 이모지가 없습니다.
  </div>

  <div class="overlay" id="overlay">
    <div class="modal" id="modal"></div>
  </div>

  <footer>
    <a href="https://github.com/S-P-A-N/ezcut-gif">ezcut</a>로 만들어진 이모지 갤러리
  </footer>

  <script>
    const REPO_RAW = "https://raw.githubusercontent.com/S-P-A-N/ezcut-gallery/main";
    let galleryData = [];

    async function init() {
      try {
        const resp = await fetch("gallery.json");
        galleryData = await resp.json();
      } catch {
        galleryData = [];
      }
      render(galleryData);
    }

    function render(items) {
      const grid = document.getElementById("gallery");
      const empty = document.getElementById("empty");
      const count = document.getElementById("count");

      count.textContent = `${items.length}개`;

      if (items.length === 0) {
        grid.innerHTML = "";
        empty.style.display = "block";
        return;
      }

      empty.style.display = "none";
      grid.innerHTML = items.map((item, i) => `
        <div class="card" data-index="${i}">
          <img class="card-img"
               src="${REPO_RAW}/${item.original_gif}"
               alt="${item.name}"
               loading="lazy">
          <div class="card-body">
            <div class="card-name">${esc(item.name)}</div>
            <div class="card-meta">
              ${item.cols}x${item.rows} · ${item.tile_count}tiles · ${formatDate(item.shared_at)}
            </div>
          </div>
        </div>
      `).join("");

      grid.querySelectorAll(".card").forEach(card => {
        card.addEventListener("click", () => openModal(items[+card.dataset.index]));
      });
    }

    function openModal(item) {
      const modal = document.getElementById("modal");
      const overlay = document.getElementById("overlay");

      modal.innerHTML = `
        <h2>${esc(item.name)}</h2>
        <img class="modal-img"
             src="${REPO_RAW}/${item.original_gif}"
             alt="${item.name}">
        <dl class="modal-info">
          <dt>Grid</dt><dd>${item.cols} x ${item.rows}</dd>
          <dt>Tiles</dt><dd>${item.tile_count}</dd>
          <dt>Tile size</dt><dd>${item.tile_size}px</dd>
          <dt>Frame step</dt><dd>${item.frame_step}</dd>
          <dt>Shared</dt><dd>${formatDate(item.shared_at)}</dd>
          ${item.author ? `<dt>Author</dt><dd>${esc(item.author)}</dd>` : ""}
        </dl>
        <div class="emoji-txt-box" id="emoji-txt-content">불러오는 중...</div>
        <div class="btn-row">
          <button class="btn" id="copy-btn" disabled>emoji.txt 복사</button>
          <button class="btn" id="close-btn">닫기</button>
        </div>
      `;

      overlay.classList.add("active");

      document.getElementById("close-btn").addEventListener("click", closeModal);

      fetchEmojiTxt(item);
    }

    async function fetchEmojiTxt(item) {
      const box = document.getElementById("emoji-txt-content");
      const btn = document.getElementById("copy-btn");

      try {
        const resp = await fetch(`${REPO_RAW}/${item.emoji_txt}`);
        const text = await resp.text();
        box.textContent = text;
        btn.disabled = false;

        btn.addEventListener("click", async () => {
          try {
            await navigator.clipboard.writeText(text);
            btn.textContent = "복사됨!";
            btn.classList.add("copied");
            setTimeout(() => {
              btn.textContent = "emoji.txt 복사";
              btn.classList.remove("copied");
            }, 2000);
          } catch {
            box.focus();
            document.execCommand("selectAll");
          }
        });
      } catch {
        box.textContent = "emoji.txt를 불러올 수 없습니다.";
      }
    }

    function closeModal() {
      document.getElementById("overlay").classList.remove("active");
    }

    document.getElementById("overlay").addEventListener("click", (e) => {
      if (e.target === e.currentTarget) closeModal();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeModal();
    });

    document.getElementById("search").addEventListener("input", (e) => {
      const query = e.target.value.toLowerCase().trim();
      if (!query) {
        render(galleryData);
        return;
      }
      render(galleryData.filter(item => item.name.toLowerCase().includes(query)));
    });

    function esc(str) {
      const el = document.createElement("span");
      el.textContent = str;
      return el.innerHTML;
    }

    function formatDate(iso) {
      if (!iso) return "";
      return iso.slice(0, 10);
    }

    init();
  </script>
</body>
</html>
